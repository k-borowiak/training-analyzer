version: "3.9"

services:
  api:
    build:
      context: ../backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/training
      - ENV=dev
      # Strava OAuth (uzupełnisz w Phase 2)
      - STRAVA_CLIENT_ID=
      - STRAVA_CLIENT_SECRET=
      - STRAVA_REDIRECT_URI=http://localhost:8000/v1/auth/strava/callback
      - SESSION_SECRET=change-me
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: training
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata: